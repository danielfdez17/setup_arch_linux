### Finish Installation
# The installer will halt+poweroff after completion.
# The orchestrator detects VM poweroff from VBoxManage, switches boot
# order from DVD→disk, removes the ISO, and starts the VM from disk.
d-i cdrom-detect/eject boolean true
d-i finish-install/reboot_in_progress note
d-i finish-install/keep-consoles boolean true
d-i debian-installer/exit/halt boolean true
d-i debian-installer/exit/poweroff boolean true


### Post-installation commands - FULL Born2beRoot Configuration + WordPress
# STRATEGY: All scripts are stored as separate files on the ISO (/cdrom/).
# late_command copies them to /target, then runs the main setup via in-target.
# This avoids ALL escaping issues, env-var problems, and busybox quirks.
#
# CRITICAL: b2b-setup.sh does ALL configuration. Do NOT add extra in-target
# commands here (npm, pip, curl|sh) — they can HANG in the d-i environment
# and block everything after them (SSH keygen, poweroff hook, etc.).
# Third-party tools are installed by b2b-setup.sh (with timeouts) and
# retried by first-boot-setup.sh on the first real boot.
d-i preseed/late_command string \
    cp /cdrom/b2b-setup.sh /target/tmp/b2b-setup.sh; \
    cp /cdrom/monitoring.sh /target/usr/local/bin/monitoring.sh; \
    cp /cdrom/first-boot-setup.sh /target/root/first-boot-setup.sh; \
    cp /cdrom/custom_shell.bin /target/tmp/custom_shell.bin 2>/dev/null || true; \
    cp /cdrom/custom_shell.dest /target/tmp/custom_shell.dest 2>/dev/null || true; \
    cp /cdrom/custom_shell.name /target/tmp/custom_shell.name 2>/dev/null || true; \
    cp /cdrom/register_shell.sh /target/tmp/register_shell.sh 2>/dev/null || true; \
    cp /cdrom/host_ssh_pubkey /target/tmp/host_ssh_pubkey 2>/dev/null || true; \
    in-target /bin/bash /tmp/b2b-setup.sh || true; \
    in-target /bin/bash -c "mkdir -p /home/dlesieur/.ssh && ssh-keygen -t ed25519 -f /home/dlesieur/.ssh/id_ed25519 -N '' -q" || true; \
    in-target /bin/bash -c "chown -R dlesieur:dlesieur /home/dlesieur/.ssh && chmod 700 /home/dlesieur/.ssh && chmod 600 /home/dlesieur/.ssh/id_ed25519" || true; \
    in-target /bin/bash -c "dpkg --configure -a" || true; \
    in-target /bin/bash -c "DEBIAN_FRONTEND=noninteractive apt-get install -y -f" || true; \
    in-target /bin/bash -c "grub-install /dev/sda" || true; \
    in-target /bin/bash -c "update-grub" || true; \
    echo '#!/bin/sh' > /target/lib/systemd/system-shutdown/vbox-poweroff.sh; \
    echo 'sleep 1 && /sbin/poweroff -f' >> /target/lib/systemd/system-shutdown/vbox-poweroff.sh; \
    chmod +x /target/lib/systemd/system-shutdown/vbox-poweroff.sh || true
