### Partitioning - FULLY AUTOMATED with Encrypted LVM
# Critical: Set automatic partitioning method
d-i partman-auto/init_automatically_partition select Guided - use entire disk and set up encrypted LVM
d-i partman-auto/method string crypto
d-i partman-crypto/passphrase password tempencrypt123
d-i partman-crypto/passphrase-again password tempencrypt123

# Skip the random data wipe — pointless in a VM (VDI is already zeroed)
# This saves 10-30+ minutes on a 32GB disk
# Both keys for compatibility: old (partman-crypto) + new trixie (partman-auto-crypto)
d-i partman-auto-crypto/erase_disks boolean false
d-i partman-crypto/erase_data boolean false

# Select the disk to partition
d-i partman-auto/disk string /dev/sda

# Force the automatic partitioning
d-i partman-auto-lvm/guided_size string max
d-i partman-auto-lvm/new_vg_name string LVMGroup
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

# Critical: Force automatic creation of partitions
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_write_new_label boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman-crypto/confirm boolean true
d-i partman-crypto/confirm_nooverwrite boolean true

# Set the recipe for custom partitioning
# Disk: 32GB (32000MB). Boot: 500MB. Crypto/LVM: rest of disk.
# LUKS header ≈ 16MB + LVM PE alignment → we do NOT hardcode the crypto
# container size. Instead, we let the LAST partition use -1 (fill remaining).
# With method=crypto, the installer auto-creates the LUKS container from
# the second partition and puts the VG inside it.
#
# Layout optimized for Docker / ft_transcendence:
#   /        10G    — base system, apt packages, binaries (dev tools + headroom)
#   swap      1G    — swap
#   /home     2G    — user data, project sources, git repos
#   /var     10G    — Docker images, containers, build cache
#   /srv      1G    — service data (lighttpd, etc.)
#   /tmp      1.5G  — temporary files, build artifacts
#   /var/log  rest  — system + Docker logs (fills remaining space)
d-i partman-auto/expert_recipe string \
    boot-root :: \
        1 1 1 free \
            $primary{ } \
            $bios_boot{ } \
            method{ biosgrub } \
        . \
        500 500 500 ext4 \
            $primary{ } $bootable{ } \
            method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } \
            mountpoint{ /boot } \
        . \
        10240 10240 10240 ext4 \
            $lvmok{ } \
            lv_name{ root } \
            method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } \
            mountpoint{ / } \
        . \
        1024 1024 1024 linux-swap \
            $lvmok{ } \
            lv_name{ swap } \
            method{ swap } format{ } \
        . \
        2048 2048 2048 ext4 \
            $lvmok{ } \
            lv_name{ home } \
            method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } \
            mountpoint{ /home } \
        . \
        10240 10240 10240 ext4 \
            $lvmok{ } \
            lv_name{ var } \
            method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } \
            mountpoint{ /var } \
        . \
        1024 1024 1024 ext4 \
            $lvmok{ } \
            lv_name{ srv } \
            method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } \
            mountpoint{ /srv } \
        . \
        1536 1536 1536 ext4 \
            $lvmok{ } \
            lv_name{ tmp } \
            method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } \
            mountpoint{ /tmp } \
        . \
        1024 1024 -1 ext4 \
            $lvmok{ } \
            lv_name{ var-log } \
            method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } \
            mountpoint{ /var/log } \
        .

# Force finish and write partitions
d-i partman/early_command string \
    debconf-set partman-auto/disk "$(list-devices disk | head -n1)"

