### Software Selection
tasksel tasksel/first multiselect standard
# CRITICAL: Keep this list MINIMAL — only packages guaranteed to exist in the
# base Debian repos. Heavy/optional packages are installed by b2b-setup.sh
# (with timeouts + error handling) or first-boot-setup.sh (with full network).
# A broken apt during pkgsel will prevent grub-installer from running!
d-i pkgsel/include string sudo openssh-server curl wget vim nano git ca-certificates gnupg apt-transport-https
d-i pkgsel/upgrade select safe-upgrade

